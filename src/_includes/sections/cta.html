<section id="cta-51">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Expert Helicopter Services</span>
            <h2 class="cs-title">Trust Your Rotorcraft To The Experts.</h2>
            <p class="cs-text">
                From routine 50-hour inspections to complete engine overhauls and emergency repairs, our certified mechanics at Chino Airport are dedicated to keeping your helicopter safe, compliant, and mission-ready.
            </p>
            <a href="/contact/" class="cs-button-solid">Schedule Maintenance</a>
        </div>
    </div>
    <!-- Background Image-->
    <picture class="cs-picture">
        <!--Mobile Image-->
        <source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/herotail.jpg" | resize({ width: 640, height: 812 }) | avif %}" type="image/avif">
        <source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/herotail.jpg" | resize({ width: 640, height: 812 }) | webp %}" type="image/webp">
        <source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/herotail.jpg" | resize({ width: 640, height: 812 }) | jpeg %}" type="image/jpeg">
        <!--Tablet Image-->
        <source media="(max-width: 1024px)" srcset="{% getUrl "/assets/images/herotail.jpg" | resize({ width: 2048, height: 750 }) | avif %}" type="image/avif">
        <source media="(max-width: 1024px)" srcset="{% getUrl "/assets/images/herotail.jpg" | resize({ width: 2048, height: 750 }) | webp %}" type="image/webp">
        <source media="(max-width: 1024px)" srcset="{% getUrl "/assets/images/herotail.jpg" | resize({ width: 2048, height: 750 }) | jpeg %}" type="image/jpeg">
        <!--Desktop Image-->
        <source media="(min-width: 1024px)" srcset="{% getUrl "/assets/images/herotail.jpg" | resize({ width: 2500, height: 555 }) | avif %}" type="image/avif">
        <source media="(min-width: 1024px)" srcset="{% getUrl "/assets/images/herotail.jpg" | resize({ width: 2500, height: 555 }) | webp %}" type="image/webp">
        <source media="(min-width: 1024px)" srcset="{% getUrl "/assets/images/herotail.jpg" | resize({ width: 2500, height: 555 }) | jpeg %}" type="image/jpeg">
        <img src="{% getUrl "/assets/images/herotail.jpg" | resize({ width: 2500, height: 555 }) | jpeg %}" alt="helicopter maintenance at chino airport" width="1920" height="426" loading="lazy" decoding="async">
    </picture>
</section>
